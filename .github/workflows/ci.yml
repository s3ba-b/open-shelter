name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore tools
        run: dotnet tool restore

      - name: Check formatting
        run: dotnet csharpier check .

      - name: Restore
        run: dotnet restore ShelterStack.slnx

      - name: Build
        run: dotnet build ShelterStack.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test ShelterStack.slnx --no-build --configuration Release

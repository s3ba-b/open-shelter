name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore OpenShelter.slnx

      - name: Build
        run: dotnet build OpenShelter.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test OpenShelter.slnx --no-build --configuration Release
